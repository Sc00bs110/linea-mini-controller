; LineaMini_C6 -- La Marzocco Mini controller firmware
; Target: DFRobot Firebeetle 2 ESP32-C6 V1.2
;
; Phase 0 scaffold: boot-only firmware that prints the build fingerprint over
; serial. No display/BLE/MQTT libraries yet -- lib_deps are added in later phases.

[env:lm_controller]
; pioarduino provides Arduino-ESP32 3.x, which adds ESP32-C6 Arduino support
; (official espressif32 <= 6.5 only ships Arduino-ESP32 2.x -- no C6).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino

monitor_speed = 115200

; Phase 2 (revised): LovyanGFX driving the DFR1092 as an ILI9488 panel. An
; earlier bring-up session confirmed this combination renders correctly on the
; real hardware (FW_VERSION v0.15-v0.25 iterated against it) even though the
; DFR1092's own datasheet is nominally ST7365P -- the two controllers are
; apparently command-compatible enough for LovyanGFX's ILI9488 driver to work.
; Superseded the DFRobot_GDL/ST7365P attempt, which never rendered anything on
; the physical panel (backlight stayed dark).
lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16
    plerup/EspSoftwareSerial @ ^8.2.0   ; GICAR UART -- see gicar.cpp for why
    lvgl/lvgl @ ^8.4.0                   ; Phase 3: UI toolkit (matches ui.cpp / lv_conf.h)
    h2zero/NimBLE-Arduino @ ^2.0.0       ; Phase 6: BLE scale (2.x required for Arduino-ESP32 3.x/C6)
    knolleary/PubSubClient @ ^2.8        ; Phase 6: MQTT

; ESP32-C6: 4MB flash, no PSRAM.
; partitions_lm_ota.csv: two 1.98MB OTA app slots + 64KB LittleFS. Replaced
; huge_app.csv (single 3MB slot, no ota_1) which made ArduinoOTA fail silently
; after accepting the invitation -- see the CSV header for the diagnosis.
; Firebeetle 2 ESP32-C6 (DFR1075) has 4MB flash, but the devkitc-1 board
; definition defaults to 8MB, which causes:
;   "Detected size(4096k) smaller than binary image header(8192k). Probe failed."
; Override explicitly -- confirmed necessary during prior bring-up.
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.partitions = partitions_lm_ota.csv
board_build.filesystem = littlefs

; Regenerate include/build_info.h (FW_GIT_HASH / FW_BUILD_TIME) on every build.
extra_scripts = pre:tools/gen_build_info.py

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -I include
    ; LVGL locates include/lv_conf.h via the simple (local include path)
    ; convention. Required now that LVGL is in the build (Phase 3).
    -DLV_CONF_INCLUDE_SIMPLE
    ; Route Serial to the native USB-Serial-JTAG console instead of UART0, so
    ; UART0's pins (GPIO16/17) are free to carry the GICAR link in later phases.
    ; The C6 has no USB-OTG peripheral, so USB_MODE is Hardware CDC and JTAG (1).
    ; Known unreliable in testing (see CLAUDE.md gotchas) -- kept anyway per
    ; user preference over adding external USB-TTL hardware.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; ── Display pins -- ILI9488 3.5" SPI (DFR1092, 320x480 portrait native) via
    ; GDI-compatible GPIOs. LovyanGFX reads these in code (main.cpp LGFX class).
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MISO=21
    -DTFT_MOSI=22
    -DTFT_SCLK=23
    -DTFT_CS=1
    -DTFT_DC=8
    -DTFT_RST=14
    -DTFT_BL=15
    ; ── Touch pins -- GT911 I2C capacitive touch over the GDI connector (DFR1092).
    ; Read in code by touch.cpp (single source of truth, same convention as TFT_*).
    ; Wire (Arduino I2C) is bundled with the ESP32 Arduino core -- no lib_deps entry
    ; is needed; the GT911 register protocol is implemented directly in touch.cpp.
    -DTOUCH_SCL=20
    -DTOUCH_SDA=19
    -DTOUCH_INT=7
    -DTOUCH_RST=6
