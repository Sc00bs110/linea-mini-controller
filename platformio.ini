; LineaMini controller firmware -- La Marzocco Mini.
; Targets (both build from the same source):
;   [env:lm_controller]     DFRobot Firebeetle 2 ESP32-C6 V1.2 (DFR1075, 4MB flash, no PSRAM)
;   [env:lm_controller_s3]  DFRobot Firebeetle 2 ESP32-S3     (DFR0975, N16R8: 16MB flash, 8MB octal PSRAM)
;
; Board-specific pin maps, flash sizes, USB config and partition tables live in
; the per-env sections; everything shared lives in [env] below.
;
; NOTE (Windows): the pioarduino Xtensa toolchain installer rejects the MSYS/Git
; Bash environment. Build the S3 env from a native Windows shell (PowerShell/cmd).

; ── Shared settings (PlatformIO merges [env] into every [env:*]) ─────────────
[env]
; pioarduino provides Arduino-ESP32 3.x, which adds ESP32-C6 Arduino support
; (official espressif32 <= 6.5 only ships Arduino-ESP32 2.x -- no C6). Used for
; both envs for consistency (the S3 is supported by both).
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = arduino
monitor_speed = 115200

; Phase 2 (revised): LovyanGFX driving the DFR1092 as an ILI9488 panel. An
; earlier bring-up session confirmed this combination renders correctly on the
; real hardware (FW_VERSION v0.15-v0.25 iterated against it) even though the
; DFR1092's own datasheet is nominally ST7365P -- the two controllers are
; apparently command-compatible enough for LovyanGFX's ILI9488 driver to work.
; Superseded the DFRobot_GDL/ST7365P attempt, which never rendered anything on
; the physical panel (backlight stayed dark).
lib_deps =
	lovyan03/LovyanGFX @ ^1.1.16
	plerup/EspSoftwareSerial @ ^8.2.0   ; GICAR UART -- see gicar.cpp for why
	lvgl/lvgl @ ^8.4.0                   ; Phase 3: UI toolkit (matches ui.cpp / lv_conf.h)
	h2zero/NimBLE-Arduino @ ^2.0.0       ; Phase 6: BLE scale (2.x required for Arduino-ESP32 3.x)
	knolleary/PubSubClient @ ^2.8        ; Phase 6: MQTT

; Regenerate include/build_info.h (FW_GIT_HASH / FW_BUILD_TIME) on every build.
extra_scripts = pre:tools/gen_build_info.py

build_flags =
	-DCORE_DEBUG_LEVEL=0
	-I include
	; LVGL locates include/lv_conf.h via the simple (local include path)
	; convention. Required now that LVGL is in the build (Phase 3).
	-DLV_CONF_INCLUDE_SIMPLE

; ── ESP32-C6 (DFR1075) ───────────────────────────────────────────────────────
[env:lm_controller]
board = esp32-c6-devkitc-1

; ESP32-C6: 4MB flash, no PSRAM.
; partitions_lm_ota.csv: two 1.98MB OTA app slots + 64KB LittleFS. Replaced
; huge_app.csv (single 3MB slot, no ota_1) which made ArduinoOTA fail silently
; after accepting the invitation -- see the CSV header for the diagnosis.
; Firebeetle 2 ESP32-C6 (DFR1075) has 4MB flash, but the devkitc-1 board
; definition defaults to 8MB, which causes:
;   "Detected size(4096k) smaller than binary image header(8192k). Probe failed."
; Override explicitly -- confirmed necessary during prior bring-up.
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.partitions = partitions_lm_ota.csv
board_build.filesystem = littlefs

build_flags =
	${env.build_flags}
	; Route Serial to the native USB-Serial-JTAG console instead of UART0, so
	; UART0's pins (GPIO16/17) are free to carry the GICAR link in later phases.
	; The C6 has no USB-OTG peripheral, so USB_MODE is Hardware CDC and JTAG (1).
	; Known unreliable in testing (see CLAUDE.md gotchas) -- kept anyway per
	; user preference over adding external USB-TTL hardware.
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	; ── Display pins -- ILI9488 3.5" SPI (DFR1092, 320x480 portrait native) via
	; GDI-compatible GPIOs. LovyanGFX reads these in code (display.cpp LGFX class).
	-DTFT_WIDTH=320
	-DTFT_HEIGHT=480
	-DTFT_MISO=21
	-DTFT_MOSI=22
	-DTFT_SCLK=23
	-DTFT_CS=1
	-DTFT_DC=8
	-DTFT_RST=14
	-DTFT_BL=15
	; ── Touch pins -- GT911 I2C capacitive touch over the GDI connector (DFR1092).
	; Read in code by touch.cpp (single source of truth, same convention as TFT_*).
	; Wire (Arduino I2C) is bundled with the ESP32 Arduino core -- no lib_deps entry
	; is needed; the GT911 register protocol is implemented directly in touch.cpp.
	-DTOUCH_SCL=20
	-DTOUCH_SDA=19
	-DTOUCH_INT=7
	-DTOUCH_RST=6
	; ── GICAR UART pins: the C6 uses the gicar.h header defaults (GPIO3=RX,
	; GPIO2=TX); no build_flag override here (see gicar.h for why those pins).

; ── ESP32-S3 (DFR0975, ESP32-S3-WROOM-1-N16R8) ───────────────────────────────
[env:lm_controller_s3]
; DFRobot Firebeetle 2 ESP32-S3 board definition. NOTE: the stock board def
; models the older 4MB / no-PSRAM Firebeetle 2 S3 variant, so we override flash
; size and PSRAM below for the N16R8 module (16MB flash + 8MB *octal* PSRAM).
; If the pioarduino Arduino core ever lacks this board's variant (unknown board
; id / missing pins_arduino.h), fall back to: board = esp32-s3-devkitc-1
board = dfrobot_firebeetle2_esp32s3

; N16R8: 16MB flash. Override both keys (as the C6 env does) because the stock
; board def defaults to 4MB.
board_upload.flash_size = 16MB
board_build.flash_size = 16MB
; 8MB PSRAM is *octal* (OPI) on the WROOM-1-N16R8 -> memory_type MUST be qio_opi
; (QIO flash + OPI PSRAM). Wrong memory_type = PSRAM not detected / boot failure.
board_build.arduino.memory_type = qio_opi
; partitions_lm_s3.csv: two 6.25MB OTA app slots + ~3.4MB LittleFS (16MB layout).
board_build.partitions = partitions_lm_s3.csv
board_build.filesystem = littlefs

build_flags =
	${env.build_flags}
	-DBOARD_HAS_PSRAM
	; S3 native USB-Serial-JTAG console (same rationale as the C6: keep UART pins
	; free). USB_MODE=1 = Hardware CDC and JTAG.
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	; ── Display pins -- ILI9488 3.5" SPI (DFR1092) on the DFR0975 GDI connector.
	; Verified from the DFRobot wiki 2026-07-06. Read in code by display.cpp.
	-DTFT_WIDTH=320
	-DTFT_HEIGHT=480
	-DTFT_SCLK=17
	-DTFT_MOSI=15
	-DTFT_MISO=16
	-DTFT_CS=18
	-DTFT_DC=3
	-DTFT_RST=38
	-DTFT_BL=21
	; ── Touch pins -- GT911 I2C over the GDI connector (DFR0975).
	-DTOUCH_SCL=2
	-DTOUCH_SDA=1
	-DTOUCH_INT=13
	-DTOUCH_RST=12
	; ── GICAR UART pins (override gicar.h defaults). GPIO1/2/3 are GDI pins on the
	; S3, so the header's 3/2 cannot be used here.
	; VERIFIED LIVE 2026-07-08: RX=14 receives clean R-frames (~97 B/s, correct
	; temp) with the machine on CN11; TX=44 carries the polls the machine answers.
	; History (why these pins, and why this orientation):
	;   - GPIO13/14 worked first but RX=13 shares the GDI touch-INT trace with
	;     the GT911 (checksum errors + dead touch from contention) -- RX moved.
	;   - GPIO10/11 (A4/A5) "mystery failure" and GPIO43 (only 0.75V under
	;     drive, cause unknown -- avoid on the DFR0975) were both dead ends;
	;     the 10/11 silence turned out to be the SAME root cause as below, not
	;     the pins.
	;   - The harness's TXD/RXD labels are CROSSED at the CN11 plug relative to
	;     the wire colors' assumed roles (confirmed by loopback test at the plug
	;     -- byte-perfect -- then a firmware pin swap immediately decoding live
	;     frames). So the wire carrying the 10k pullup lands on the machine's
	;     RXD (our TX=44 drives it; pullup is harmless there), and the machine's
	;     TXD arrives on the plain-resistor wire (our RX=14). Second time this
	;     project has been bitten by TXD/RXD naming -- trust decoded frames,
	;     never labels.
	-DGICAR_RX_PIN=14
	-DGICAR_TX_PIN=44
	; Distinct mDNS/OTA hostname so both boards can be on the network at once
	; during the port (main.cpp DEVICE_HOSTNAME; C6 keeps linea-mini-c6).
	-DDEVICE_HOSTNAME=\"linea-mini-s3\"
	; GitHub release OTA (Part B): pulls in WiFiClientSecure/mbedtls TLS. The S3
	; (6.25MB app slots) has ample room; enabled here. See the C6 env for why it
	; may or may not carry this feature.
	-DFEATURE_GH_OTA
